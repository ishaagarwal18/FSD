<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button  style="color: blueviolet;background-color: aqua; width: 100px; height: 50px;font-size: medium;"
        onmousedown="mdown(this)" onmouseup="mup(this)">Button</button>
    <script>
        function mdown(x){
            x.innerHTML="Hello.."
            x.style.fontSize="25px"
            x.style.backgroundColor="lightgreen"
        }
        function mup(x){
            x.innerHTML="Bye.."
            x.style.fontSize="15px"
            x.style.backgroundColor="plum"
        }
    </script>
</body>
</html>
