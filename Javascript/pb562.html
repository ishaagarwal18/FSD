<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        const students = [
            { name: 'Alice', scores: { math: 85, science: 90, history: 78 } },
            { name: 'Bob', scores: { math: 92, science: 88, history: 95 } },
            { name: 'Charlie', scores: { math: 70, science: 75, history: 80 } },
            { name: 'Diana', scores: { math: 95, science: 98, history: 93 } }
        ];

        let avg=0;
        let maxavg=0;
        let topstudent={}
        for(let s of students)
        {
            avg=(s.scores.math+s.scores.science+s.scores.history)/3
            if(avg>maxavg)
            {
                maxavg=avg;
                topstudent={
                    name:s.name,
                    average:avg.toFixed(2)
                };
            }   
        }
        console.log(topstudent)
    </script>
</head>

</body>
</html>
