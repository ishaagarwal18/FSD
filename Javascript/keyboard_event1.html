<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function fun1(id){
            id.style.backgroundColor="lightblue"
        }
        function fun2(id){
            id.style.backgroundColor="lightgreen"
        }
    </script>
</head>
<body onkeyup="fun1(this)" onkeydown="fun2(this)">
<!-- <body onkeypress="fun2(this)"> -->
</body>
</html>
