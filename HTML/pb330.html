<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .title{color: blue;animation-delay: 3s; animation-duration: 3s; animation-iteration-count: infinite;
                transform: rotate(360deg); animation-name: rotate; align-items: center; display: flex;
                 justify-content: center; animation-timing-function: ease-in-out;} 
        @keyframes rotate{
            0%{transform: rotate(0deg);}
            50%{transform: rotate(-360deg);}
            100%{transform: rotate(0deg);}
        }
    </style>
</head>
<body>
    <div>
        <h2 class="title">Banner</h2>
    </div>
</body>
</html>
