<html>
    <body>
        <form action="#" method="post">
            <fieldset>
                <legend>Login form</legend>
                <input type="text" name="Uname" placeholder="Enter user name">Name<br/>
                <input type="email" name="eid">Email<br/>
                <input type="password" name="pwd">Password</br>
                <input type="number" name="num" min="0" max="100" step="5">Number1<br/>
                <input type="tel" name="num2">Number2<br/>  
                <input type="radio" name="r1" value="male">Male
                <input type="radio" name="r1" value="female">Female<br/>
                <input type="checkbox" name="c1" value="Ahme">Ahmedabad
                <input type="checkbox" name="c1" value="gan">Gandhinagar
                <input type="checkbox" name="c1" value="surat">Surat<br/>
                <input type="date" name="dob">Birthdate<br/>
                <input type="color" name="bol">Select color<br/>
                <input type="range" min="0" max="200" value="20"><br/>
                <input type="search"> Search bar<br/>
                <input type="file" name="f1" accept=".jpg" multiple>Attach CV<br/>
                <input list="browsers" name="browser">
                <datalist id="browsers">
                    <option value="chrome">
                    <option value="chromeone">
                    <option value="firefox">
                </datalist></br>
                <input type="text" name="h1" value="hide" hidden>This is hidden</br>
                <input type="text" name="r1" value="readonly" readonly>Read only</br>
                <input type="text" name="d1" value="disabled" disabled>Disable</br>
                <textarea rows="10" cols="20">address</textarea>
                <input type="text" autofocus>name
                <input type="submit"><input type="reset"> 
            </fieldset>
        </form>
    </body>
</html>
