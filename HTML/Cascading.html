<!-- Cascading between external and inline -->
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="s1.CSS" type="text/CSS">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<!-- Cascading between external and internal -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{color: yellow;}
    </style>
    <link rel="stylesheet" href="s1.CSS" type="text/CSS">
 </head>
 <body>
    <p>para1</p>
    <h1>Heading 1</h1>
 </body>
 </html>
