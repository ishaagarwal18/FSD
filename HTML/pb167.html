<html>
    <body>
        <table border="1">
            <form>
            <thead>Registration form</thead>
                <fieldset>
                    <tr>
                        <th>Enter your first<br/> 
                                  name</th>
                        <td><input type="text" name="fname" placeholder="enter your first name"></td>
                    </tr>
                    <tr> 
                        
                        <th>Enter your last 
                                  name</th>
                        <td><input type="text" name="lname"></td>
                    </tr>
                    <tr>
                        <th>Enter your 
                            password</th>   
                        <td><input type="password" name="password"></td>
                    </tr>
                    <tr>
                        <th>ReEnter your 
                              password</th>
                        <td><input type="password" name="repass"></td>
                    </tr>
                    <tr>
                        <th>Enter your email</th>
                        <td><input type="email" name="email"></td>
                    </tr>
                    <tr>
                        <th>Enter your address</th>
                        <td><textarea rows="10" cols="20"></textarea></td>
                    </tr>
                    <tr>
                        <th>Sell</th>
                    </tr>
                </fieldset>
            </form>
        </table>
    </body>
</html>
