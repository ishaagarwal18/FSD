<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- External CSS link -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
            rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
            crossorigin="anonymous">

        <!-- External JS link -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
                crossorigin="anonymous"></script>
    </head>
    <body>

        <form action="#" class="was-validated">
            <!-- Name -->
            <div class="row">
                <div class="col-sm-1">
                    <label class="form-label">Name</label>
                </div>
                <div class="col-sm-11">
                    <input type="text" class="form-control" name="name" placeholder="Enter your name" required>
                </div>
            </div>
            <br/>

            <!-- Email -->
            <div class="row">
                <div class="col-sm-1">
                    <label class="form-label">Email</label>
                </div>
                <div class="col-sm-11">
                    <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
                </div>
            </div>
            <br/>

            <!-- Message -->
            <div class="row">
                <div class="col-sm-1">
                    <label class="form-label">Message</label>
                </div>
                <div class="col-sm-11">
                    <textarea class="form-control" name="message" rows="3" required></textarea>
                </div>
            </div>
            <br/>
            <!-- Buttons -->
            <button type="submit" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#a">Send</button>
            <button type="reset" class="btn btn-danger">Reset</button>
        </form>

        <div class="modal fade" id="a">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="text-danger modal-title">Send message</h2>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">Your message is send successfully</div>
                </div>
            </div>
        </div>
    </body>
</html>
