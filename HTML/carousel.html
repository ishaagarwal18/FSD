<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- External CSS link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
          rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
          crossorigin="anonymous">

    <!-- External JS link -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"></script>
</head>
<body>
    <div class="carousel slide" data-bs-ride="carousel" data-bs-pause="hover" id="cc">
        <div class="carousel-indicators">
            <button data-bs-target="#cc" data-bs-slide-to="0" class="active"></button>
            <button data-bs-target="#cc" data-bs-slide-to="1"></button>
            <button data-bs-target="#cc" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active" data-bs-interval="5000">
                <img src="flower.jpg" class="w-100">
                <div class="carousel-caption">
                    <h6>Label of first</h6>
                    <p>Extra info</p>
                    <a href="#" class="btn btn-danger"></a>
                </div>
            </div>
            <div class="carousel-item" data-bs-interval="5000">
                <img src="animation.gif" class="w-100">
            </div>
            <div class="carousel-item" data-bs-interval="5000">
                <img src="marvel.jpg" class="w-100 vh-100">
            </div>
        </div>
        <button class="carousel-control-prev" data-bs-target="#cc" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" data-bs-target="#cc" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
</body>
</html>
