<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*paragraph tag the text should move from left to right continuously delay- 1s advertisement page*/
        p{animation-delay: 1s; animation-timing-function: ease; 
            position: relative;animation-name: moving;animation-iteration-count: infinite;
            color: deeppink;animation-direction: alternate;animation-duration: 5s;}
        @keyframes moving{
            0%{left: 0px;}
            100%{left: 1000px;}
        }
    </style>
</head> 
<body>
    <p>Advertisement</p>
</body>
</html>
