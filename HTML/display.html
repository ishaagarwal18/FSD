<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer{border: 2px solid black; padding: 10px ;margin: 5px ; background-color: skyblue;}
        .inner{border: 1px solid purple; padding: 5px; margin: 5px; background-color: plum; width: 100px;
                height: 100px; display: inline-block;}
        .outer1{display: flex; flex-direction: row; justify-content: space-between;align-items: center;
            flex-wrap: nowrap; gap: 15px; background-color: lightcyan;padding: 15px;
            border: 2px solid black;}
        .inner1{background-color: blue; color: white; padding: 20px; width: 200px;}
        .outer2{background-color: plum; padding: 20px; display: grid; grid-template-columns: 200px 200px 200px;
                border:2px  solid rgb(171, 2, 171); gap: 10px;}
        .inner2{background-color: skyblue; padding: 20px ; color: blue ; text-align: center; margin: 20px;
                border:2px solid rgb(24, 143, 65);}
        .outer3{margin-top: 50px;height: 800px; border: 1px solid red; position: relative;}
        .inner3{border: 1px solid black;  height: 100px; width: 100px; margin-left: 20px;}
        .t1{background-color: rgb(247, 78, 78); position: static; left: 50px;}
        .t2{background-color: lightcoral; position: relative; top: 10px;}
        .t3{background-color: rgb(127, 184, 240);position: absolute; top: 0px; right: 0px;z-index: 1;}
        .t4{ background-color: rgb(233, 253, 100);position: fixed; top: 0px; right: 0px;}
        .t5{background-color: rgb(239, 79, 167);position: sticky; top: 0px;}
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">Box-1</div>
        <div class="inner">Box-2</div>
        <div class="inner">Box-3</div>
        <div class="inner">Box-4</div>
        <div class="inner">Box-5</div>
        <div class="inner">Box-6</div>
        <div class="inner">Box-7</div>
    </div>
    <div class="outer1">
        <div class="inner1">Item-1</div>
        <div class="inner1">Item-2</div>
        <div class="inner1">Item-3</div>
        <div class="inner1">Item-4</div>
        <div class="inner1">Item-5</div>
        <div class="inner1">Item-6</div>
        <div class="inner1">Item-7</div>
        <div class="inner1">Item-8</div>
        <div class="inner1">Item-9</div>
    </div>
</br>
    <div class="outer2">
        <div class="inner2">1</div>
        <div class="inner2">2</div>
        <div class="inner2">3</div>
        <div class="inner2">4</div>
        <div class="inner2">5</div>
        <div class="inner2">6</div>
        <div class="inner2">7</div>
        <div class="inner2">8</div>
        <div class="inner2">9</div>
    </div>
    <br/>
    <div class="outer3">
        <div class="inner3 t1">Static</div>
        <div class="inner3 t2">Relative</div>
        <div class="inner3 t3">Absolute</div>
        <div class="inner3 t4">Fixed</div>
        <div class="inner3 t5">Sticky</div>
    </div>
</body>
</html>
