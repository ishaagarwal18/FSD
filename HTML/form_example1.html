<html>
    <head>
        <title>Form example</title>
    </head>
    <body>
        <form>
            Name : <input type="text" placeholder="Enter your name:"><br>
            Firstname: <input type="text" name="Fname"><br>
            Lastname:<input type="text" name="Lname"><br>
            Password :<input type="password" placeholder="Enter password:"><br>
            Email : <input type="email"><br>
            <input type="checkbox" name="language" value="Hindi">
            <input type="checkbox" name="language" value="Gujrati">
            <input type="checkbox" name="language" value="Marathi">
            <input type="checkbox" name="language" value="English">English<br>
            <input type="radio" name="Gender" value="Male">Male
            <input type="radio" name="Gender" value="Female">Female<br>
            <input type="reset"><br>
            <input type="submit"><br>
            <select name="Cars">
                <option value="BMW">BMW</option>
                <option value="M4">M4</option>
                <option value="Bugati">Bugati</option>
                <option value="Porsche">Porsche</option>
                <option value="Mercedes">mercedes</option>
            </select>
        </form>
    </body>
</html>
