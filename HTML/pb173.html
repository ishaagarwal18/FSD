<!DOCTYPE html>
<html>
<head>
    <title>Food Review Form</title>
</head>
<body>
    <h2>Food Review Form</h2>
    <form>
        <fieldset>
            <legend><b>Customer Details</b></legend>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

            <label for="number">Number:</label>
            <input type="tel" id="number" name="number" placeholder="Enter your phone number"><br><br>

            <label>Pizza Name:</label><br>
            <input type="checkbox" name="pizza" value="simple"> Simple
            <input type="checkbox" name="pizza" value="cheese"> Cheese<br><br>

            <label for="size">Outlet Size:</label>
            <select id="size" name="size">
                <option>Small</option>
                <option>Medium</option>
                <option>Large</option>
            </select><br><br>

            <label for="comment">Comment:</label><br>
            <textarea id="comment" name="comment" rows="3" cols="40"></textarea><br><br>
        </fieldset>

        <fieldset>
            <legend><b>Scale Ordered Pizza</b></legend>
            <table border="1" cellpadding="5">
                <tr>
                    <th>Scale</th>
                    <th>Good</th>
                    <th>Average</th>
                    <th>Bad</th>
                </tr>
                <tr>
                    <td>Quality</td>
                    <td><input type="radio" name="quality" value="good"></td>
                    <td><input type="radio" name="quality" value="average"></td>
                    <td><input type="radio" name="quality" value="bad"></td>
                </tr>
                <tr>
                    <td>Freshness</td>
                    <td><input type="radio" name="freshness" value="good"></td>
                    <td><input type="radio" name="freshness" value="average"></td>
                    <td><input type="radio" name="freshness" value="bad"></td>
                </tr>
                <tr>
                    <td>Quantity</td>
                    <td><input type="radio" name="quantity" value="good"></td>
                    <td><input type="radio" name="quantity" value="average"></td>
                    <td><input type="radio" name="quantity" value="bad"></td>
                </tr>
            </table><br>

            <label for="rating">Overall Rating:</label>
            <input type="range" id="rating" name="rating" min="0" max="10" value="5"> (0–10)
        </fieldset><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
