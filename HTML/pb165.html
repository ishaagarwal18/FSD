<html>
    <body>
        <form>
            <fieldset>
                <legend>Signup</legend>
                Username <input type="name" placeholder="Enter User Name" name="name"></br><br/>
                Password <input type="password" name="password"><br/><br/>
                Gender <input type="radio" name="r1" value="male" checked>Male
                       <input type="radio" name="r1" value="female">Female<br/><br/>
                Area of Interest <input type="checkbox" name="c1" value="DS" checked>DS
                                 <input type="checkbox" name="c2" value="DBMS">DBMS
                                 <input type="checkbox" name="c3" value="CN">CN
                                 <input type="checkbox" name="c4" value="Full Stack">Full Stack<br/><br/>
                Department <select>
                    <option selected hidden disabled>---Select Department---</option>
                    <option>SY1</option>
                    <option>SY2</option>
                    <option>SY3</option>
                    <option>SY4</option>
                    <option>SY5</option>
                </select><br/><br/>
                <textarea rows="10" cols="20" placeholder="Hello" name="address">address</textarea><br/><br/>
                Upload CV <input type="file" name="f1" accept=".jpg" multiple><br/><br/>
                Date <input type="date" name="dob"><br/><br/>
                Email <input type="email" name="email"><br/><br/>
                <input type="submit"> <input type="reset">
            </fieldset>
        </form>
    </body>
</html>
