Write one JSON string with date property and print date in indian standard time.
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    <script>
        function call(){
            st=JSON.parse('{"dob":"1993-09-02"}')
            n=new Date(st.dob);
            alert("IST is"+n);

        }
       
    </script>
    <button onclick="call()">Click me</button>
</body>
</html>
