<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/submit" method="get">
        <h1>Employee Details</h1>
        <label>Name</label><input type="text" name="name"><br><br>
        <label>Email</label><input type="email" name="email"><br><br>
        <label>Message</label><textarea name="message" rows="4" cols="50"></textarea><br><br>
        <label>Rating</label>
        <input type="radio" name="rating" value="bad"> Bad
        <input type="radio" name="rating" value="average"> Average
        <input type="radio" name="rating" value="good"> Good
        <input type="radio" name="rating" value="verygood"> Very Good
        <input type="radio" name="rating" value="excellent"> Excellent<br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
